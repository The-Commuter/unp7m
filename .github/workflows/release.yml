name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyobjc-core pyobjc-framework-Cocoa

      - name: Build
        run: python build.py

      - name: Create zip
        run: |
          cd dist
          zip -r ../unp7m-macos.zip unp7m.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unp7m-macos
          path: unp7m-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: python build.py

      - name: Create zip
        run: Compress-Archive -Path dist/unp7m.exe -DestinationPath unp7m-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unp7m-windows
          path: unp7m-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: unp7m-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: unp7m-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unp7m-macos.zip
            unp7m-windows.zip
          generate_release_notes: true
